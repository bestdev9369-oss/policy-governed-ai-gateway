version: "3.9"

# ─── Networks ──────────────────────────────────────────────────────────────────
networks:
  pgag:
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [pgag]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: pgag
      POSTGRES_USER: pgag
      POSTGRES_PASSWORD: pgag_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgag -d pgag"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [pgag]
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── API ───────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    networks: [pgag]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pgag:pgag_dev@postgres:5432/pgag
      REDIS_URL: redis://redis:6379
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: production
      LOG_LEVEL: info
      JWT_SECRET: change-me-in-production
      SEED_TENANT_API_KEY: demo-tenant-key-acme
      SEED_ADMIN_API_KEY: demo-admin-key-internal
      RATE_LIMIT_MAX: 100
      RATE_LIMIT_WINDOW_MS: 60000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Web Dashboard ─────────────────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    networks: [pgag]
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"
